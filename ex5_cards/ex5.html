<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>


  <!-- Estrutura da Grid dos Cards -->
<div class="container mt-3">
  <div class="row">
    <div class="col-sm-6">

      <!-- Estrutura de CADA card -->
      <div class="card">
        <div class="card-body">
          <img src="teto.png" alt="" style="width: 150px; height: 100px; border-radius: 10px; border: none;">
          <h5 class="card-title"><strong>Pélucia da Teto</strong></h5>
          <p class="card-text">A fofura da teto, misturada com o amor por pães. </p>
          <button class="btn btn-primary">Comprar agora</button>
          <button class="btn btn-secondary">Adicionar ao carrinho</button>
        </div>
      </div>

      <div class="card">
        <div class="card-body">
          <img src="mikudayo.jpg" alt="" style="width: 150px; height: 100px; border-radius: 10px; border: none;"> 
          <h5 class="card-title"><strong>Pélucia da Miku</strong></h5>
          <p class="card-text">A maior vocaloid do mundo. Mais conhecida. <strong> Compre agora e obtenha a versão limitada do Brasil! </strong> </p>
          <button class="btn btn-primary">Comprar agora</button>
          <button class="btn btn-secondary">Adicionar ao carrinho</button>
        </div>
      </div>
      
    </div>
    </div>
  </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
