<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botões Bootstrap</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap ícones -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

</head>
<body>
    <!-- 1ª Digitação (Aqui) -->
    <div class="container d-flex justify-content-center mt-3">
        <button class="btn btn-success ms-3">
            <i class="bi bi-heart-fill"></i> Alimentar Tetolings</button>
        <button class="btn btn-danger ms-3">
            <i class="bi bi-x-circle-fill"></i> Matar Tetolings
        </button>
        <button class="btn btn-warning ms-3">
            <i class="bi bi-exclamation-triangle-fill"></i> Libertar a Teto Ancestral</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
