<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar Bootstrap</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap ícones -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>
    <!-- 1ª Digitação (Aqui) -->
    <nav class="navbar navbar-expand-lg navbar-light bg-primary">
        <div class="container">
            <!-- Logo -->
            <a href="#" class="navbar-brand">
                <i class="bi bi-apple text-light" style="font-size: 2rem;"></i>
            </a>

            <!-- Botão Hambúrger -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#minhaNavbar">
                <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
            </button>
            <!-- Links -->
            <div class="collapse navbar-collapse" id="minhaNavbar">
                <div class="navbar-nav ms-auto">
                    <a href="#" class="navbar-link text-light m-3"><i class="bi bi-house text-light fs-3 pe-1"></i>Home</a>
                    <a href="#" class="navbar-link text-light m-3"><i class="bi bi-person text-light fs-3 pe-1"></i>Perfil</a>
                    <a href="#" class="navbar-link text-light m-3"><i class="bi bi-envelope text-light fs-3 pe-1"></i>Mensagens</a>
                </div>
            </div>
        </div>  
    </nav>



    
    <!-- Bootstrap JS Bundle-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
