<!-- 1ª Digitação (Resolver exercício aqui) --> <!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<title>Exercício de fixação 2 - Formulário</title>
</head>
<body>
    <!-- Container para centralizar -->
    <div class="container-custom">

    <!-- Formulário (Topo) -->
        <form class="custom-form">
            <h1 class="text-white mb-3">Login</h1>

    <!--- Input de Email -->
        <div class="mb-3 form-group-custom"> 
            <div class="input-group">
                <span class="input-group-text custom-icon">
                <i class="bi bi-envelope"></i>
                </span>
            <input type="email" class="form-control" placeholder="Insira seu email cadastrado...">
            </div>
        </div>

    <!-- Input de Password -->
        <div class="mb-3 form-group-custom"> 
            <div class="input-group">
                <span class="input-group-text custom-icon">
                    <i class="bi bi-lock"></i>
                </span>
            <input type="password" class="form-control" placeholder="Insira sua senha...">
            </div>
        </div>
        <a class="text-white text-center w-100" href="#">Esqueceu sua senha?</a>
        <button class="btn btn-success button-custom" type="submit"><i class="bi bi-arrow-right"></i> Entrar</button>
        <span class="text-white text-center w-100">Novo aqui? <a class="custom-button text-white" href="#">Cadastre-se agora</a>
    </span>
    </form>
    </div>
</div>
</body>
</html>
